<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #1e1e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculator {
            background: #2d2d2d;
            padding: 15px;
            border-radius: 10px;
            width: 250px;
        }

        #display {
            width: 100%;
            height: 45px;
            font-size: 18px;
            text-align: right;
            margin-bottom: 10px;
        }

        button {
            width: 50px;
            height: 40px;
            margin: 3px;
            font-size: 16px;
        }

        .operator { background: orange; }
        .equal { background: green; color: white; }
        .clear { background: red; color: white; }
        .special { background: gray; color: white; }
    </style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" disabled>

    <div>
        <button onclick="clearDisplay()" class="clear">C</button>
        <button onclick="append('%')" class="operator">%</button>
        <button onclick="append('/')" class="operator">/</button>
        <button onclick="append('*')" class="operator">*</button>
    </div>

    <div>
        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('-')" class="operator">-</button>
    </div>

    <div>
        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('+')" class="operator">+</button>
    </div>

    <div>
        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="calculate()" class="equal">=</button>
    </div>

    <div>
        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button onclick="showDeveloper()" class="special">A</button>
        <button onclick="showAppInfo()" class="special">B</button>
    </div>
</div>

<script>
function append(val) {
    document.getElementById("display").value += val;
}

function clearDisplay() {
    document.getElementById("display").value = "";
}

function calculate() {
    try {
        document.getElementById("display").value = eval(document.getElementById("display").value);
    } catch {
        alert("Error");
    }
}

function showDeveloper() {
    alert("Developer: Rogie C. Lopez\nCourse: BSIT\nLocation: Poblacion, Buug, Zamboanga Sibugay\nCode:1234");
}

function showAppInfo() {
    let code = prompt("Enter secret code:");

    if(code === "1234") {
        alert("Standard Calculator v6.7\nStandard calculator with secret features. Developed by Rogie gwapo");
    } else {
        alert("Access Denied 😈");
    }
}
</script>

</body>
</html>
